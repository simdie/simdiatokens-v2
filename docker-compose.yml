version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: simdia_db
    environment:
      POSTGRES_USER: simdia
      POSTGRES_PASSWORD: simdia
      POSTGRES_DB: simdiatokens
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simdia -d simdiatokens"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./SimdiaTokens/simdiatokens_server
      dockerfile: Dockerfile
    container_name: simdia_backend
    environment:
      PORT: 8080
      DATABASE_URL: postgresql://simdia:simdia@db:5432/simdiatokens
      MASTER_SECRET: change-me-in-production-32-chars-long!!
      JWT_SECRET: change-me-in-production-jwt-secret!!!
      CLIENT_ID: ${CLIENT_ID:-}
      CLIENT_SECRET: ${CLIENT_SECRET:-}
      REDIRECT_URI: ${REDIRECT_URI:-http://localhost:8080/callback}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: gpt-4o-mini
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./SimdiaTokens/simdiatokens_server/data:/app/data

  frontend:
    build:
      context: ./SimdiaTokens-frontend
      dockerfile: Dockerfile
    container_name: simdia_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
