name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SimdiaTokens/simdiatokens_server
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: SimdiaTokens/simdiatokens_server/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests
        run: cargo test
        env:
          CLIENT_ID: dummy-client-id
          CLIENT_SECRET: dummy-client-secret
          REDIRECT_URI: http://localhost:8080/callback
          MASTER_SECRET: dummy-master-secret-for-ci
          JWT_SECRET: dummy-jwt-secret-for-ci

      - name: Build release
        run: cargo build --release
        env:
          CLIENT_ID: dummy-client-id
          CLIENT_SECRET: dummy-client-secret
          REDIRECT_URI: http://localhost:8080/callback
          MASTER_SECRET: dummy-master-secret-for-ci
          JWT_SECRET: dummy-jwt-secret-for-ci

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SimdiaTokens-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: SimdiaTokens-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  deploy-backend:
    name: Deploy Backend
    needs: [backend-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: deploy-backend.yml
          token: ${{ secrets.GITHUB_TOKEN }}
        # Alternative: use Railway CLI directly
        # run: |
        #   npm install -g @railway/cli
        #   railway login --token ${{ secrets.RAILWAY_TOKEN }}
        #   railway up --service simdia-backend

  deploy-frontend:
    name: Deploy Frontend
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./SimdiaTokens-frontend
